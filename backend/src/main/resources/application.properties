logging.level.com.smart.parking=DEBUG

# Cashfree API Credentials (reads from env vars, fallback to empty for local dev)
cashfree.app.id=${CASHFREE_APP_ID:}
cashfree.secret.key=${CASHFREE_SECRET_KEY:}
cashfree.environment=${CASHFREE_ENVIRONMENT:sandbox}

