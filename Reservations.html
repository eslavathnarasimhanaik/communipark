<head>

    <meta name="keywords" content="reserve parking spot, online parking booking, smart parking reservations">

    <title>CommuniPark Reservations</title>

    <link rel="stylesheet" href="s.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <i class="fas fa-parking"></i> CommuniPark
            </a>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="dashboard.html"><i class="fas fa-chart-bar"></i> Dashboard</a>
                <a href="Reservations.html"><i class="fas fa-calendar-check"></i> Reservations</a>
                <a href="Profile.html"><i class="fas fa-user"></i> Profile</a>
                <a href="admin.html"><i class="fas fa-user-shield"></i> Admin</a>
                <a href="exit.html"><i class="fas fa-door-open"></i> Exit Gate</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="reservation-form">
            <h2>Reserve Your Parking Spot</h2>
            <form id="booking-form">
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="vehicleNumber">Vehicle Number:</label>
                    <input type="text" id="vehicleNumber" name="vehicleNumber" placeholder="e.g. AP-28-AB-1234" required>
                </div>

                <div class="input-group">
                    <label for="vehicle">Vehicle Type:</label>
                    <select id="vehicle" name="vehicle" required>
                        <option value="">Select a vehicle</option>
                        <option value="car">🚗 Car</option>
                        <option value="motorcycle">🏍️ Motorcycle</option>
                        <option value="truck">🚛 Truck</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="userType">User Type:</label>
                    <select id="userType" name="userType" required>
                        <option value="Resident">Resident</option>
                        <option value="Visitor">Visitor</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="apartmentNumber">Apartment / Unit #:</label>
                    <input type="text" id="apartmentNumber" name="apartmentNumber" placeholder="e.g. 402B" required>
                </div>

                <div class="input-group">
                    <label for="duration">Duration:</label>
                    <select id="duration" name="duration" required>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="3">3 Hours</option>
                        <option value="4">4 Hours</option>
                        <option value="5">5 Hours</option>
                        <option value="6">6 Hours</option>
                        <option value="7">7 Hours</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="input-group">
                    <label for="time">Time:</label>
                    <input type="time" id="time" name="time" required>
                </div>

                <div class="input-group">
                    <label for="phoneNumber">WhatsApp Number:</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+91 98765 43210">
                </div>

                <div class="input-group">
                    <label for="paymentMethod">Payment Method:</label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="RAZORPAY" selected>💳 Pay with Razorpay (Instant Exit Code)</option>
                        <option value="UPI">📱 UPI QR (Manual)</option>
                        <option value="CASH">💵 Cash</option>
                    </select>
                </div>

                <button type="submit">Reserve & Pay</button>
            </form>
            <div id="confirmation-message" style="display: none; text-align: center; font-size: 18px; color: #10b981; margin-top: 20px; font-weight: 600;"></div>
        </section>

        <section id="reservations-list-section" style="margin-top: 3rem; background: var(--bg-card); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Recent Reservations</h2>
            <div style="overflow-x: auto;">
                <table class="dashboard-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Spot</th>
                            <th>Driver</th>
                            <th>User Type</th>
                            <th>Apartment</th>
                            <th>Vehicle Type</th>
                            <th>Vehicle Number</th>
                            <th>Duration</th>
                            <th>Cost</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Receipt</th>
                            <th>Exit Code</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-table-body">
                        <!-- Filled dynamically -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="Reservations.js"></script>
    <footer>
        <p>&copy; 2025 Smart Parking System | All Rights Reserved</p>
    </footer>
</body>
</html>
